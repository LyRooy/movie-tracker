name = "movie-tracker"
main = "cloudflare/worker.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# Environment variables
[vars]
JWT_SECRET = "change-this-to-a-secure-random-string-in-production"

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "movie-tracker-db"
database_id = "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" # Replace with your D1 database ID

# R2 Storage binding (for file uploads)
[[r2_buckets]]
binding = "UPLOADS"
bucket_name = "movie-tracker-uploads"

# Development configuration
[env.development]
vars = { JWT_SECRET = "development-secret-key" }

# Production configuration
[env.production]
vars = { JWT_SECRET = "production-secret-key-change-this" }

# Build configuration
[build]
command = ""

# Observability
[observability]
enabled = true
