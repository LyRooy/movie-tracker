<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieTracker - Logowanie</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
        }

        .auth-box {
            background: var(--background-color);
            padding: 3rem;
            border-radius: 10px;
            box-shadow: var(--shadow);
            max-width: 400px;
            width: 100%;
        }

        .auth-box h1 {
            text-align: center;
            margin-bottom: 2rem;
            color: var(--text-color);
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group label {
            color: var(--text-color);
            font-weight: 500;
        }

        .form-group input {
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            font-size: 1rem;
            background: var(--card-background);
            color: var(--text-color);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .auth-btn {
            padding: 0.75rem;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 1rem;
        }

        .auth-btn:hover {
            background: var(--primary-hover);
        }

        .auth-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .auth-toggle {
            text-align: center;
            margin-top: 1rem;
            color: var(--text-color);
        }

        .auth-toggle a {
            color: var(--primary-color);
            cursor: pointer;
            text-decoration: underline;
        }

        .error-message {
            color: #e74c3c;
            font-size: 0.9rem;
            padding: 0.5rem;
            background: #fee;
            border-radius: 5px;
            display: none;
        }

        .success-message {
            color: #27ae60;
            font-size: 0.9rem;
            padding: 0.5rem;
            background: #efe;
            border-radius: 5px;
            display: none;
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-logo i {
            font-size: 4rem;
            color: var(--primary-color);
        }

        .theme-toggle-auth {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: var(--card-background);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: var(--shadow);
        }

        .theme-toggle-auth i {
            color: var(--text-color);
        }
    </style>
</head>
<body class="light-theme">
    <button id="theme-toggle-auth" class="theme-toggle-auth">
        <i class="fas fa-moon"></i>
    </button>

    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-logo">
                <i class="fas fa-film"></i>
            </div>

            <!-- Login Form -->
            <div id="login-form-container">
                <h1>Zaloguj się</h1>
                <div class="error-message" id="login-error"></div>
                <form class="auth-form" id="login-form">
                    <div class="form-group">
                        <label for="login-email">Email</label>
                        <input type="email" id="login-email" required>
                    </div>
                    <div class="form-group">
                        <label for="login-password">Hasło</label>
                        <input type="password" id="login-password" required>
                    </div>
                    <button type="submit" class="auth-btn" id="login-btn">Zaloguj się</button>
                </form>
                <div class="auth-toggle">
                    Nie masz konta? <a id="show-register">Zarejestruj się</a>
                </div>
            </div>

            <!-- Register Form -->
            <div id="register-form-container" style="display: none;">
                <h1>Zarejestruj się</h1>
                <div class="error-message" id="register-error"></div>
                <div class="success-message" id="register-success"></div>
                <form class="auth-form" id="register-form">
                    <div class="form-group">
                        <label for="register-nickname">Nickname</label>
                        <input type="text" id="register-nickname" required>
                    </div>
                    <div class="form-group">
                        <label for="register-email">Email</label>
                        <input type="email" id="register-email" required>
                    </div>
                    <div class="form-group">
                        <label for="register-password">Hasło</label>
                        <input type="password" id="register-password" required minlength="6">
                    </div>
                    <div class="form-group">
                        <label for="register-password-confirm">Potwierdź hasło</label>
                        <input type="password" id="register-password-confirm" required minlength="6">
                    </div>
                    <button type="submit" class="auth-btn" id="register-btn">Zarejestruj się</button>
                </form>
                <div class="auth-toggle">
                    Masz już konto? <a id="show-login">Zaloguj się</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Theme toggle
        const themeToggle = document.getElementById('theme-toggle-auth');
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.body.className = `${savedTheme}-theme`;
        themeToggle.querySelector('i').className = savedTheme === 'light' ? 'fas fa-moon' : 'fas fa-sun';

        themeToggle.addEventListener('click', () => {
            const currentTheme = document.body.classList.contains('dark-theme') ? 'dark' : 'light';
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            
            document.body.className = `${newTheme}-theme`;
            localStorage.setItem('theme', newTheme);
            themeToggle.querySelector('i').className = newTheme === 'light' ? 'fas fa-moon' : 'fas fa-sun';
        });

        // Check if already logged in
        if (localStorage.getItem('token')) {
            window.location.href = 'index.html';
        }

        // Form toggle
        document.getElementById('show-register').addEventListener('click', () => {
            document.getElementById('login-form-container').style.display = 'none';
            document.getElementById('register-form-container').style.display = 'block';
        });

        document.getElementById('show-login').addEventListener('click', () => {
            document.getElementById('register-form-container').style.display = 'none';
            document.getElementById('login-form-container').style.display = 'block';
        });

        // Login
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const errorDiv = document.getElementById('login-error');
            const btn = document.getElementById('login-btn');

            errorDiv.style.display = 'none';
            btn.disabled = true;
            btn.textContent = 'Logowanie...';

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    window.location.href = 'index.html';
                } else {
                    errorDiv.textContent = data.message || 'Błąd logowania';
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                errorDiv.textContent = 'Błąd połączenia z serwerem';
                errorDiv.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Zaloguj się';
            }
        });

        // Register
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const nickname = document.getElementById('register-nickname').value;
            const email = document.getElementById('register-email').value;
            const password = document.getElementById('register-password').value;
            const passwordConfirm = document.getElementById('register-password-confirm').value;
            const errorDiv = document.getElementById('register-error');
            const successDiv = document.getElementById('register-success');
            const btn = document.getElementById('register-btn');

            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';

            if (password !== passwordConfirm) {
                errorDiv.textContent = 'Hasła nie są identyczne';
                errorDiv.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Rejestracja...';

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ nickname, email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    successDiv.textContent = 'Rejestracja udana! Przekierowanie...';
                    successDiv.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                } else {
                    errorDiv.textContent = data.message || 'Błąd rejestracji';
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                errorDiv.textContent = 'Błąd połączenia z serwerem';
                errorDiv.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Zarejestruj się';
            }
        });
    </script>
</body>
</html>
